name: Release

# ============================================================================
# Release publishing workflow (triggered on a v* tag).
#
# Signing and notarization are the DEFAULT behavior; they run automatically if
# the required secrets are defined in the repo settings. If the secrets are
# ABSENT, the workflow still produces an unsigned DMG and DOES NOT FAIL
# (graceful fallback).
#
# Required secrets (Settings → Secrets and variables → Actions):
#   MACOS_CERTIFICATE     — base64 of the "Developer ID Application" .p12
#                           certificate:  base64 -i cert.p12 | pbcopy
#   MACOS_CERTIFICATE_PWD — the password set when exporting the .p12
#   MACOS_SIGN_IDENTITY   — the signing identity, e.g.:
#                           "Developer ID Application: First Last (TEAMID)"
#   AC_API_KEY            — base64 of the App Store Connect API key (.p8):
#                           base64 -i AuthKey_XXXX.p8 | pbcopy
#   AC_API_KEY_ID         — the API key ID (e.g. ABCD1234EF)
#   AC_API_ISSUER_ID      — App Store Connect issuer ID (UUID)
#
# For detailed setup steps see: docs/RELEASING.md
# ============================================================================

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      # Mapped here so step-level `if:` can check them via `env.* != ''`
      # (the secrets context is not reliable inside a step-level if:).
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      AC_API_KEY: ${{ secrets.AC_API_KEY }}
      AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
      AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Assemble .app
        run: bash scripts/make-app.sh "${{ steps.ver.outputs.version }}"

      # --- Optional code signing (runs only if the signing secrets exist) ---
      - name: Import signing certificate
        if: ${{ env.MACOS_CERTIFICATE != '' && env.MACOS_CERTIFICATE_PWD != '' }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          rm -f /tmp/cert.p12

      - name: Codesign app (Developer ID, hardened runtime + timestamp)
        if: ${{ env.MACOS_SIGN_IDENTITY != '' }}
        run: |
          codesign --force --deep --options runtime --timestamp \
            --sign "$MACOS_SIGN_IDENTITY" build/MacBroom.app
          codesign --verify --strict --verbose=2 build/MacBroom.app

      - name: Build DMG
        run: bash scripts/make-dmg.sh "${{ steps.ver.outputs.version }}"

      # --- Optional notarization (App Store Connect API key) + staple ---
      - name: Notarize & staple DMG
        if: ${{ env.AC_API_KEY != '' && env.AC_API_KEY_ID != '' && env.AC_API_ISSUER_ID != '' }}
        run: |
          echo "$AC_API_KEY" | base64 --decode > /tmp/ac_key.p8
          xcrun notarytool submit "build/MacBroom-${{ steps.ver.outputs.version }}.dmg" \
            --key /tmp/ac_key.p8 \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "build/MacBroom-${{ steps.ver.outputs.version }}.dmg"
          xcrun stapler validate "build/MacBroom-${{ steps.ver.outputs.version }}.dmg"
          rm -f /tmp/ac_key.p8

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: build/MacBroom-${{ steps.ver.outputs.version }}.dmg
          body: |
            MacBroom ${{ steps.ver.outputs.version }}

            > Note: if the signing/notarization secrets are not configured, the DMG
            > is unsigned; you may need to right-click → Open the first time.
