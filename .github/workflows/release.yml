name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      # Mapped here so they can gate steps via `env.* != ''` (the secrets context
      # is not reliably available in step-level `if:`).
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      AC_API_KEY: ${{ secrets.AC_API_KEY }}
      AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
      AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Assemble .app
        run: bash scripts/make-app.sh "${{ steps.ver.outputs.version }}"

      # --- Optional code signing (runs only if signing secrets are configured) ---
      - name: Import signing certificate
        if: ${{ env.MACOS_CERTIFICATE != '' }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain

      - name: Codesign app
        if: ${{ env.MACOS_SIGN_IDENTITY != '' }}
        run: |
          codesign --force --deep --options runtime --timestamp \
            --sign "$MACOS_SIGN_IDENTITY" build/MacBroom.app
          codesign --verify --strict --verbose=2 build/MacBroom.app

      - name: Build DMG
        run: bash scripts/make-dmg.sh "${{ steps.ver.outputs.version }}"

      # --- Optional notarization (App Store Connect API key) ---
      - name: Notarize DMG
        if: ${{ env.AC_API_KEY != '' }}
        run: |
          echo "$AC_API_KEY" | base64 --decode > /tmp/ac_key.p8
          xcrun notarytool submit "build/MacBroom-${{ steps.ver.outputs.version }}.dmg" \
            --key /tmp/ac_key.p8 \
            --key-id "$AC_API_KEY_ID" \
            --issuer "$AC_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "build/MacBroom-${{ steps.ver.outputs.version }}.dmg"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: build/MacBroom-${{ steps.ver.outputs.version }}.dmg
          body: |
            MacBroom ${{ steps.ver.outputs.version }}

            > Not: İmzalama/notarization secret'ları ayarlı değilse DMG imzasızdır;
            > açarken sağ tık → Aç gerekebilir.
