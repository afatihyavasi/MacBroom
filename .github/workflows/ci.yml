name: CI

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install shell test tools
        run: brew install bats-core shellcheck

      - name: Shellcheck engine
        run: shellcheck -x engine/macbroom-engine.sh

      - name: Engine tests (bats)
        run: bats engine/tests/

      # Treat compiler warnings as errors so unused vars, deprecations, and
      # unreachable code can't land. (swift-format is intentionally not used:
      # this codebase has a deliberate hand-tuned style — aligned string tables,
      # intentional semicolons — that the formatter's defaults would mangle.)
      - name: Build app (warnings as errors)
        working-directory: app
        run: swift build -Xswiftc -warnings-as-errors

      - name: Swift self-tests
        working-directory: app
        run: swift run MacBroomSelfTest

      - name: Assemble .app (smoke)
        run: bash scripts/make-app.sh "0.0.0-ci"
