name: Deploy landing page

# Publishes the contents of docs/site/ to GitHub Pages.
# GitHub Pages must be enabled: Settings → Pages → Source: "GitHub Actions".
# If Pages is not enabled, the deploy step is skipped; the workflow does not fail.

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deploy to run at a time.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6
        continue-on-error: true

      - name: Upload artifact
        if: ${{ steps.pages.outcome == 'success' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site

      - name: Deploy to GitHub Pages
        id: deployment
        if: ${{ steps.pages.outcome == 'success' }}
        uses: actions/deploy-pages@v5
